<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="theme-color" content="#667eea"/>
<title>🏠 Family Calendar</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;
    background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);padding:16px}
  input,select,button{font-family:inherit}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;
    align-items:center;justify-content:center;z-index:100;padding:16px;backdrop-filter:blur(4px)}
  .modal{background:white;border-radius:24px;padding:28px;width:100%;max-width:460px;
    box-shadow:0 25px 50px rgba(0,0,0,0.25);max-height:90vh;overflow-y:auto}
  .btn{padding:12px 20px;border-radius:13px;border:none;font-size:15px;
    font-weight:700;cursor:pointer;transition:all 0.2s}
  .btn-primary{background:linear-gradient(135deg,#667eea,#764ba2);color:white}
  .btn-secondary{background:white;border:2px solid #e2e8f0;color:#718096}
  .btn:disabled{background:#e2e8f0;color:#aaa;cursor:default}
  .toggle-wrap{display:flex;align-items:center;justify-content:space-between;
    border-radius:14px;padding:14px 16px;margin-bottom:12px}
  .toggle{width:46px;height:26px;border-radius:13px;cursor:pointer;
    position:relative;transition:background 0.2s;flex-shrink:0}
  .toggle-knob{width:20px;height:20px;border-radius:50%;background:white;
    position:absolute;top:3px;transition:left 0.2s;box-shadow:0 1px 4px rgba(0,0,0,0.2)}
  .chip{font-size:12px;padding:2px 8px;border-radius:8px;font-weight:600;display:inline-flex;align-items:center;gap:4px}
  .day-cell{min-height:70px;border-radius:12px;padding:6px;cursor:pointer;
    border:2px solid #f0f0f0;background:#f9fafb;transition:all 0.15s;position:relative}
  .day-cell:hover{background:#EEF2FF;border-color:#667eea;transform:scale(1.02)}
  .day-cell.today{background:linear-gradient(135deg,#667eea,#764ba2);border:none}
  .plan-pill{font-size:9px;padding:2px 5px;border-radius:5px;margin-bottom:2px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600}
  .dot{width:7px;height:7px;border-radius:50%;display:inline-block}
  .plan-card{border-radius:14px;padding:14px;margin-bottom:10px;border:2px solid}
  .member-btn{display:flex;align-items:center;gap:6px;padding:8px 16px;
    border-radius:20px;border:2px solid;cursor:pointer;font-weight:700;font-size:14px;transition:all 0.2s}
  .glass{background:rgba(255,255,255,0.15);border:2px solid rgba(255,255,255,0.2);border-radius:20px;padding:14px 18px}
  .label{display:block;font-weight:700;font-size:12px;color:#718096;
    text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);
    background:#2d3748;color:white;padding:12px 24px;border-radius:20px;
    font-weight:600;font-size:14px;transition:transform 0.3s;z-index:999;pointer-events:none}
  #toast.show{transform:translateX(-50%) translateY(0)}
  #loading{position:fixed;inset:0;background:linear-gradient(135deg,#667eea,#764ba2);
    display:flex;align-items:center;justify-content:center;z-index:999;
    color:white;font-size:22px;font-weight:700}
</style>
</head>
<body>

<div id="loading">🏠 Loading Family Calendar...</div>
<div id="toast"></div>
<div id="app"></div>

<script>
// ════════════════════════════════════════════════
//  ⚡ REPLACE THESE VALUES WITH YOUR SUPABASE KEYS
// ════════════════════════════════════════════════
const SUPABASE_URL = 'https://nfycxkkywwofamxrgicg.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5meWN4a2t5d3dvZmFteHJnaWNnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMzM4ODMsImV4cCI6MjA4NzkwOTg4M30.0tnhSEYFG1e7UI5DfOoFUiR31vKYJXpTGCfuwtS7gsM';
// ════════════════════════════════════════════════

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── Constants ──────────────────────────────────
const COLORS = [
  {bg:'#FF6B6B',light:'#FFF0F0',text:'#c0392b',border:'#ffb3b3'},
  {bg:'#4ECDC4',light:'#E6FFFE',text:'#0e9f9a',border:'#9de8e4'},
  {bg:'#A855F7',light:'#F5F0FF',text:'#7c3aed',border:'#d8b4fe'},
  {bg:'#F59E0B',light:'#FFFBEB',text:'#b45309',border:'#fcd34d'},
];
const EMOJIS = ['🧑','👩','👨','👦','👧','👴','👵','🧒','🐱','🐶','🦊','🐼'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const genId = () => Math.random().toString(36).slice(2,10);
const dateStr = (y,m,d) => `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

// ── State ──────────────────────────────────────
let state = {
  members: [],
  plans: [],
  currentYear: new Date().getFullYear(),
  currentMonth: new Date().getMonth(),
  activeMember: null,
  screen: 'loading',
  modal: null,
};
let realtimeChannel = null;

// ── Supabase helpers ───────────────────────────
async function loadMembers() {
  const { data } = await db.from('members').select('*');
  return (data || []).map(r => ({
    id: r.id, name: r.name, emoji: r.emoji, colorIndex: r.color_index
  }));
}

async function saveMembers(members) {
  await db.from('members').delete().neq('id', '___');
  if (members.length) {
    await db.from('members').insert(members.map(m => ({
      id: m.id, name: m.name, emoji: m.emoji, color_index: m.colorIndex
    })));
  }
}

async function loadPlans() {
  const { data } = await db.from('plans').select('*');
  return (data || []).map(r => ({
    id: r.id, date: r.date, memberId: r.member_id, title: r.title,
    hasDinner: r.has_dinner, dinnerTime: r.dinner_time,
    isFamily: r.is_family, taggedMembers: r.tagged_members || []
  }));
}

async function addPlan(plan) {
  await db.from('plans').insert({
    id: plan.id, date: plan.date, member_id: plan.memberId,
    title: plan.title, has_dinner: plan.hasDinner, dinner_time: plan.dinnerTime,
    is_family: plan.isFamily, tagged_members: plan.taggedMembers
  });
}

async function deletePlan(id) {
  await db.from('plans').delete().eq('id', id);
}

function subscribeToPlans() {
  if (realtimeChannel) db.removeChannel(realtimeChannel);
  realtimeChannel = db.channel('plans-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'plans' }, async () => {
      state.plans = await loadPlans();
      if (state.screen === 'calendar' && !state.modal) render();
    })
    .subscribe();
}

// ── Toast ──────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Render ─────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  if (state.screen === 'loading') return;
  if (state.screen === 'setup') { app.innerHTML = renderSetup(); bindSetup(); return; }
  app.innerHTML = renderCalendar();
  if (state.modal) renderModal();
  bindCalendar();
}

// ── Setup Screen ───────────────────────────────
let setupMembers = [];

function renderSetup() {
  if (!setupMembers.length) {
    setupMembers = state.members.length
      ? JSON.parse(JSON.stringify(state.members))
      : [{id:genId(),name:'',emoji:'🧑',colorIndex:0},{id:genId(),name:'',emoji:'👩',colorIndex:1}];
  }
  const rows = setupMembers.map((m,i) => {
    const col = COLORS[m.colorIndex];
    return `<div style="background:${col.light};border:2px solid ${col.border};border-radius:16px;padding:16px;margin-bottom:12px">
      <div style="display:flex;align-items:center;gap:12px">
        <select class="emoji-sel" data-idx="${i}" style="font-size:26px;background:white;border:none;border-radius:10px;padding:4px 6px;cursor:pointer">
          ${EMOJIS.map(e=>`<option value="${e}" ${e===m.emoji?'selected':''}>${e}</option>`).join('')}
        </select>
        <input class="name-inp" data-idx="${i}" placeholder="Member ${i+1} name" value="${m.name}"
          style="flex:1;padding:10px 14px;border-radius:10px;font-size:15px;font-weight:600;border:2px solid ${col.border};outline:none;color:#2d3748"/>
        <div style="width:22px;height:22px;border-radius:50%;background:${col.bg}"></div>
        ${setupMembers.length>1?`<button class="remove-btn" data-idx="${i}" style="background:none;border:none;font-size:18px;cursor:pointer;color:#ccc">✕</button>`:''}
      </div>
    </div>`;
  }).join('');
  const valid = setupMembers.every(m => m.name.trim());
  return `<div class="overlay"><div class="modal">
    <h2 style="font-size:26px;font-weight:800;color:#2d3748;margin-bottom:6px">🏠 Set Up Your Family</h2>
    <p style="color:#718096;font-size:14px;margin-bottom:24px">Add up to 4 family members</p>
    <div id="member-rows">${rows}</div>
    ${setupMembers.length<4?`<button id="add-member-btn" style="width:100%;padding:12px;border:2px dashed #cbd5e0;border-radius:16px;background:none;color:#718096;font-size:15px;cursor:pointer;font-weight:600;margin-bottom:8px">+ Add Family Member</button>`:''}
    <button id="setup-done-btn" class="btn ${valid?'btn-primary':''}" style="width:100%;margin-top:12px" ${valid?'':'disabled'}>
      ${state.members.length?'💾 Save Changes':'🎉 Let\'s Go!'}
    </button>
  </div></div>`;
}

function bindSetup() {
  document.querySelectorAll('.name-inp').forEach(el => {
    el.addEventListener('input', e => { setupMembers[+e.target.dataset.idx].name = e.target.value; refreshSetupBtn(); });
  });
  document.querySelectorAll('.emoji-sel').forEach(el => {
    el.addEventListener('change', e => { setupMembers[+e.target.dataset.idx].emoji = e.target.value; });
  });
  document.querySelectorAll('.remove-btn').forEach(el => {
    el.addEventListener('click', e => {
      setupMembers.splice(+e.target.dataset.idx, 1);
      setupMembers.forEach((m,i) => m.colorIndex = i);
      document.getElementById('app').innerHTML = renderSetup(); bindSetup();
    });
  });
  document.getElementById('add-member-btn')?.addEventListener('click', () => {
    const idx = setupMembers.length;
    setupMembers.push({id:genId(),name:'',emoji:EMOJIS[idx],colorIndex:idx});
    document.getElementById('app').innerHTML = renderSetup(); bindSetup();
  });
  document.getElementById('setup-done-btn').addEventListener('click', async () => {
    if (!setupMembers.every(m => m.name.trim())) return;
    showToast('💾 Saving...');
    await saveMembers(setupMembers);
    state.members = setupMembers;
    state.activeMember = state.members.find(m => m.id === state.activeMember?.id) || state.members[0];
    state.screen = 'calendar';
    state.modal = null;
    setupMembers = [];
    render();
    showToast('✅ Family saved!');
  });
}

function refreshSetupBtn() {
  const btn = document.getElementById('setup-done-btn');
  if (!btn) return;
  const valid = setupMembers.every(m => m.name.trim());
  btn.disabled = !valid;
  btn.className = `btn ${valid?'btn-primary':''}`;
}

// ── Calendar ───────────────────────────────────
function renderCalendar() {
  const { members, plans, currentYear:y, currentMonth:m, activeMember } = state;
  const firstDay = new Date(y,m,1).getDay();
  const daysInMonth = new Date(y,m+1,0).getDate();
  const today = new Date();
  const isToday = d => today.getFullYear()===y && today.getMonth()===m && today.getDate()===d;

  const memberPills = members.map(mem => {
    const col = COLORS[mem.colorIndex];
    const active = activeMember?.id === mem.id;
    return `<button class="member-btn active-member-btn" data-id="${mem.id}" style="border-color:${active?col.bg:'rgba(255,255,255,0.4)'};background:${active?col.bg:'rgba(255,255,255,0.9)'};color:${active?'white':col.text};transform:${active?'scale(1.05)':'scale(1)'};box-shadow:${active?`0 4px 15px ${col.bg}88`:'none'}">
      <span style="font-size:20px">${mem.emoji}</span>${mem.name}${active?'<span style="font-size:11px;opacity:0.85"> ✓ Me!</span>':''}
    </button>`;
  }).join('');

  const dayCells = [];
  for (let i=0;i<firstDay;i++) dayCells.push('<div></div>');
  for (let d=1;d<=daysInMonth;d++) {
    const ds = dateStr(y,m,d);
    const dp = plans.filter(p=>p.date===ds);
    const memberIds = [...new Set(dp.map(p=>p.memberId))];
    const t = isToday(d);
    const dots = memberIds.map(id => { const mem=members.find(x=>x.id===id); return mem?`<span class="dot" style="background:${COLORS[mem.colorIndex].bg}"></span>`:''; }).join('');
    const pills = dp.slice(0,2).map(plan => {
      const mem = members.find(x=>x.id===plan.memberId); if(!mem) return '';
      const col = COLORS[mem.colorIndex];
      return `<div class="plan-pill" style="background:${t?'rgba(255,255,255,0.2)':col.light};color:${t?'white':col.text}">${plan.hasDinner?'🍽️ ':''}${plan.isFamily?'👨‍👩‍👧 ':''}${plan.title}</div>`;
    }).join('');
    const more = dp.length>2?`<div style="font-size:9px;color:${t?'rgba(255,255,255,0.7)':'#a0aec0'};font-weight:600">+${dp.length-2} more</div>`:'';
    dayCells.push(`<div class="day-cell ${t?'today':''}" data-day="${d}">
      <div style="font-weight:800;font-size:13px;color:${t?'white':'#374151'};margin-bottom:4px">${d}</div>
      ${memberIds.length?`<div style="display:flex;gap:2px;margin-bottom:3px;flex-wrap:wrap">${dots}${dp.some(p=>p.isFamily)?'<span style="font-size:9px">👨‍👩‍👧</span>':''}</div>`:''}
      ${pills}${more}
    </div>`);
  }

  const legend = members.map(m => {
    const col = COLORS[m.colorIndex];
    return `<div style="display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.15);border:2px solid rgba(255,255,255,0.2);border-radius:20px;padding:6px 14px">
      <span style="font-size:16px">${m.emoji}</span><span style="color:white;font-size:12px;font-weight:700">${m.name}</span>
      <div class="dot" style="background:${col.bg}"></div>
    </div>`;
  }).join('');

  return `<div style="max-width:860px;margin:0 auto">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <div>
        <h1 style="color:white;font-size:28px;margin:0;font-weight:900">🏠 Family Calendar</h1>
        <p style="color:rgba(255,255,255,0.75);margin:3px 0 0;font-size:13px">Stay connected, stay together 💕</p>
      </div>
      <button id="settings-btn" style="background:rgba(255,255,255,0.2);border:2px solid rgba(255,255,255,0.3);color:white;border-radius:20px;padding:8px 16px;cursor:pointer;font-size:13px;font-weight:600">⚙️ Members</button>
    </div>
    <div class="glass" style="margin-bottom:16px">
      <p style="color:rgba(255,255,255,0.9);font-size:13px;font-weight:600;margin-bottom:10px">👋 Who are you? Select yourself to add plans:</p>
      <div style="display:flex;gap:8px;flex-wrap:wrap">${memberPills}</div>
      ${activeMember?`<p style="color:rgba(255,255,255,0.75);font-size:12px;margin-top:10px;margin-bottom:0">Tap any day on the calendar to add your plans, ${activeMember.name}!</p>`:''}
    </div>
    <div style="background:white;border-radius:24px;padding:20px;box-shadow:0 20px 60px rgba(0,0,0,0.25)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
        <button id="prev-month" style="background:#f0f0f0;border:none;border-radius:12px;width:38px;height:38px;font-size:18px;cursor:pointer;font-weight:700">‹</button>
        <h2 style="margin:0;font-size:22px;font-weight:800;color:#2d3748">${MONTHS[m]} ${y}</h2>
        <button id="next-month" style="background:#f0f0f0;border:none;border-radius:12px;width:38px;height:38px;font-size:18px;cursor:pointer;font-weight:700">›</button>
      </div>
      <div class="cal-grid" style="margin-bottom:3px">
        ${DAYS.map(d=>`<div style="text-align:center;font-size:11px;font-weight:700;color:#a0aec0;padding:4px 0;text-transform:uppercase">${d}</div>`).join('')}
      </div>
      <div class="cal-grid">${dayCells.join('')}</div>
    </div>
    <div style="display:flex;gap:10px;margin-top:14px;flex-wrap:wrap">${legend}
      <div style="display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.15);border:2px solid rgba(255,255,255,0.2);border-radius:20px;padding:6px 14px">
        <span style="color:white;font-size:12px;font-weight:700">🍽️ Dinner home &nbsp; 👨‍👩‍👧 Family plan</span>
      </div>
    </div>
    <p style="color:rgba(255,255,255,0.5);font-size:11px;text-align:center;margin-top:12px">⚡ Real-time sync powered by Supabase — all family members share the same live calendar</p>
  </div>`;
}

function bindCalendar() {
  document.getElementById('settings-btn')?.addEventListener('click', () => { setupMembers=[]; state.screen='setup'; render(); });
  document.getElementById('prev-month')?.addEventListener('click', () => {
    state.currentMonth--; if(state.currentMonth<0){state.currentMonth=11;state.currentYear--;} render();
  });
  document.getElementById('next-month')?.addEventListener('click', () => {
    state.currentMonth++; if(state.currentMonth>11){state.currentMonth=0;state.currentYear++;} render();
  });
  document.querySelectorAll('.active-member-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      const id = e.currentTarget.dataset.id;
      state.activeMember = state.activeMember?.id===id ? null : state.members.find(m=>m.id===id);
      render();
    });
  });
  document.querySelectorAll('.day-cell').forEach(cell => {
    cell.addEventListener('click', e => {
      state.modal = { type:'day', day:+e.currentTarget.dataset.day };
      renderModal();
    });
  });
}

// ── Modals ─────────────────────────────────────
let modalState = {};

function renderModal() {
  document.getElementById('modal-overlay')?.remove();
  const div = document.createElement('div');
  div.id = 'modal-overlay'; div.className = 'overlay';
  if (state.modal?.type==='day') { div.innerHTML=renderDayModal(); document.body.appendChild(div); bindDayModal(); }
  else if (state.modal?.type==='addPlan') { div.innerHTML=renderAddPlanModal(); document.body.appendChild(div); bindAddPlanModal(); }
}

function closeModal() { document.getElementById('modal-overlay')?.remove(); state.modal=null; modalState={}; }

function renderDayModal() {
  const { day } = state.modal;
  const ds = dateStr(state.currentYear, state.currentMonth, day);
  const plans = state.plans.filter(p=>p.date===ds);
  const d = new Date(state.currentYear, state.currentMonth, day);
  const label = d.toLocaleDateString('en-SG',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const dinnerPlans = plans.filter(p=>p.hasDinner);

  const dinnerBox = dinnerPlans.length?`<div style="background:#FFF8F0;border:2px solid #FDDCB5;border-radius:14px;padding:14px;margin-bottom:16px">
    <div style="font-weight:700;font-size:13px;color:#92400e;margin-bottom:8px">🍽️ Dinner Tonight</div>
    ${dinnerPlans.map(p=>{const m=state.members.find(x=>x.id===p.memberId);return m?`<div style="display:flex;align-items:center;gap:8px;font-size:13px;color:#78350f;margin-bottom:4px"><span>${m.emoji}</span><span style="font-weight:600">${m.name}</span><span style="color:#a16207">@ ${p.dinnerTime}</span></div>`:''}).join('')}
  </div>`:'';

  const planCards = plans.length?plans.map(plan=>{
    const mem=state.members.find(x=>x.id===plan.memberId); if(!mem) return '';
    const col=COLORS[mem.colorIndex];
    const tagged=state.members.filter(x=>plan.taggedMembers?.includes(x.id));
    return `<div class="plan-card" style="background:${col.light};border-color:${col.border}">
      <div style="display:flex;align-items:flex-start;gap:10px">
        <div style="width:36px;height:36px;border-radius:50%;background:${col.bg};display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">${mem.emoji}</div>
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
            <span style="font-weight:700;font-size:13px;color:${col.text}">${mem.name}</span>
            ${plan.isFamily?'<span class="chip" style="background:#D1FAE5;color:#065F46">Family Plan</span>':''}
          </div>
          <div style="font-weight:600;font-size:15px;color:#2d3748;margin-bottom:6px">${plan.isFamily?'👨‍👩‍👧 ':''}${plan.title}</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            ${plan.hasDinner?`<span class="chip" style="background:#FEF3C7;color:#b45309">🍽️ Dinner ${plan.dinnerTime}</span>`:''}
            ${tagged.map(tm=>`<span class="chip" style="background:${COLORS[tm.colorIndex].light};color:${COLORS[tm.colorIndex].text}">${tm.emoji} ${tm.name}</span>`).join('')}
          </div>
        </div>
        <button class="delete-plan-btn" data-id="${plan.id}" style="background:none;border:none;font-size:15px;cursor:pointer;color:#ccc">🗑️</button>
      </div>
    </div>`;
  }).join(''):'<div style="text-align:center;padding:30px 0;color:#a0aec0"><div style="font-size:32px">📭</div><div style="font-size:14px;margin-top:8px">Nothing planned yet!</div></div>';

  return `<div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px">
      <div><h3 style="margin:0;font-size:20px;font-weight:800;color:#2d3748">📅 ${label}</h3>
      <p style="margin:4px 0 0;color:#718096;font-size:13px">${plans.length===0?'No plans yet':`${plans.length} plan${plans.length>1?'s':''}`}</p></div>
      <button id="close-modal-btn" style="background:none;border:none;font-size:20px;cursor:pointer;color:#999">✕</button>
    </div>
    ${dinnerBox}
    <div style="max-height:360px;overflow-y:auto">${planCards}</div>
    <div style="display:flex;gap:10px;margin-top:20px">
      <button id="close-modal-btn2" class="btn btn-secondary" style="flex:1">Close</button>
      <button id="add-plan-btn" class="btn btn-primary" style="flex:2">+ Add a Plan</button>
    </div>
  </div>`;
}

function bindDayModal() {
  document.getElementById('close-modal-btn')?.addEventListener('click', closeModal);
  document.getElementById('close-modal-btn2')?.addEventListener('click', closeModal);
  document.getElementById('add-plan-btn')?.addEventListener('click', () => { state.modal={type:'addPlan',day:state.modal.day}; renderModal(); });
  document.querySelectorAll('.delete-plan-btn').forEach(btn => {
    btn.addEventListener('click', async e => {
      await deletePlan(e.currentTarget.dataset.id);
      showToast('🗑️ Plan deleted');
      closeModal();
    });
  });
}

function renderAddPlanModal() {
  const { day } = state.modal;
  const d = new Date(state.currentYear, state.currentMonth, day);
  const label = d.toLocaleDateString('en-SG',{weekday:'long',day:'numeric',month:'long'});
  const { members, activeMember } = state;
  const selId = modalState.memberId || activeMember?.id || members[0]?.id;
  const mem = members.find(m=>m.id===selId)||members[0];
  const col = COLORS[mem?.colorIndex||0];
  const hasDinner = modalState.hasDinner||false;
  const isFamily = modalState.isFamily||false;
  const tagged = modalState.tagged||[];

  const memberBtns = members.map(m=>{
    const c=COLORS[m.colorIndex]; const active=m.id===selId;
    return `<button class="member-sel-btn" data-id="${m.id}" style="display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:20px;border:2px solid ${active?c.bg:'#e2e8f0'};background:${active?c.light:'white'};color:${active?c.text:'#718096'};cursor:pointer;font-weight:600;font-size:13px">
      <span style="font-size:18px">${m.emoji}</span>${m.name}
    </button>`;
  }).join('');

  const tagBtns = members.filter(m=>m.id!==selId).map(m=>{
    const c=COLORS[m.colorIndex]; const on=tagged.includes(m.id);
    return `<button class="tag-btn" data-id="${m.id}" style="display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;border:2px solid ${on?c.bg:'#e2e8f0'};background:${on?c.light:'white'};color:${on?c.text:'#718096'};cursor:pointer;font-size:13px;font-weight:600">
      ${m.emoji} ${m.name}
    </button>`;
  }).join('');

  return `<div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px">
      <div><h3 style="margin:0;font-size:20px;font-weight:800;color:#2d3748">📝 Add a Plan</h3>
      <p style="margin:4px 0 0;color:#718096;font-size:13px">${label}</p></div>
      <button id="close-modal-btn" style="background:none;border:none;font-size:20px;cursor:pointer;color:#999">✕</button>
    </div>
    <span class="label">Who's adding this?</span>
    <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">${memberBtns}</div>
    <span class="label">What's the plan?</span>
    <input id="plan-title" placeholder="e.g. Going to gym, Movie night..."
      style="width:100%;padding:12px 14px;border-radius:12px;font-size:14px;border:2px solid ${col.border};outline:none;margin-bottom:16px;background:${col.light};color:#2d3748;font-weight:500"/>
    <div class="toggle-wrap" style="background:#FFF8F0;border:2px solid #FDDCB5">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:20px">🍽️</span>
        <div><div style="font-weight:700;font-size:14px;color:#2d3748">Home for dinner?</div>
        <div style="font-size:12px;color:#718096">Let the family know!</div></div>
      </div>
      <div class="toggle" id="dinner-toggle" style="background:${hasDinner?'#F59E0B':'#CBD5E0'}">
        <div class="toggle-knob" style="left:${hasDinner?23:3}px"></div>
      </div>
    </div>
    ${hasDinner?`<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;margin-top:-4px">
      <span style="font-size:13px;color:#718096;font-weight:500">Dinner time:</span>
      <input type="time" id="dinner-time" value="${modalState.dinnerTime||'19:00'}"
        style="padding:6px 10px;border-radius:8px;border:2px solid #FDDCB5;font-size:14px"/>
    </div>`:''}
    <div class="toggle-wrap" style="background:#F0FFF4;border:2px solid #9AE6B4">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:20px">👨‍👩‍👧</span>
        <div><div style="font-weight:700;font-size:14px;color:#2d3748">Family plan?</div>
        <div style="font-size:12px;color:#718096">Invite other members</div></div>
      </div>
      <div class="toggle" id="family-toggle" style="background:${isFamily?'#48BB78':'#CBD5E0'}">
        <div class="toggle-knob" style="left:${isFamily?23:3}px"></div>
      </div>
    </div>
    ${isFamily&&tagBtns?`<div style="margin-bottom:16px;margin-top:-4px">
      <p style="margin:0 0 8px;font-size:12px;color:#718096;font-weight:500">Tag family members:</p>
      <div style="display:flex;gap:8px;flex-wrap:wrap">${tagBtns}</div>
    </div>`:''}
    <div style="display:flex;gap:10px;margin-top:8px">
      <button id="cancel-add-btn" class="btn btn-secondary" style="flex:1">Cancel</button>
      <button id="save-plan-btn" class="btn btn-primary" style="flex:2">✨ Save Plan</button>
    </div>
  </div>`;
}

function bindAddPlanModal() {
  const day = state.modal.day;
  document.getElementById('close-modal-btn')?.addEventListener('click', closeModal);
  document.getElementById('cancel-add-btn')?.addEventListener('click', () => { state.modal={type:'day',day}; renderModal(); });
  document.querySelectorAll('.member-sel-btn').forEach(btn => {
    btn.addEventListener('click', e => { modalState.memberId=e.currentTarget.dataset.id; modalState.title=document.getElementById('plan-title')?.value||''; renderModal(); });
  });
  document.getElementById('dinner-toggle')?.addEventListener('click', () => { modalState.hasDinner=!modalState.hasDinner; modalState.title=document.getElementById('plan-title')?.value||''; renderModal(); });
  document.getElementById('family-toggle')?.addEventListener('click', () => { modalState.isFamily=!modalState.isFamily; modalState.title=document.getElementById('plan-title')?.value||''; renderModal(); });
  document.querySelectorAll('.tag-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      const id=e.currentTarget.dataset.id; const arr=modalState.tagged||[];
      modalState.tagged=arr.includes(id)?arr.filter(x=>x!==id):[...arr,id];
      modalState.title=document.getElementById('plan-title')?.value||''; renderModal();
    });
  });
  const inp = document.getElementById('plan-title');
  if (inp) { if(modalState.title) inp.value=modalState.title; inp.focus(); }
  document.getElementById('save-plan-btn')?.addEventListener('click', async () => {
    const title = document.getElementById('plan-title')?.value?.trim();
    if (!title) { showToast('⚠️ Please enter a plan name'); return; }
    const selId = modalState.memberId||state.activeMember?.id||state.members[0]?.id;
    await addPlan({
      id:genId(), date:dateStr(state.currentYear,state.currentMonth,day),
      memberId:selId, title, hasDinner:modalState.hasDinner||false,
      dinnerTime:modalState.hasDinner?(document.getElementById('dinner-time')?.value||'19:00'):null,
      isFamily:modalState.isFamily||false, taggedMembers:modalState.isFamily?(modalState.tagged||[]):[]
    });
    showToast('🎉 Plan saved!');
    closeModal();
  });
}

// ── Init ───────────────────────────────────────
async function init() {
  try {
    const [members, plans] = await Promise.all([loadMembers(), loadPlans()]);
    state.members = members;
    state.plans = plans;
    state.activeMember = members[0] || null;
    state.screen = members.length ? 'calendar' : 'setup';
  } catch(e) {
    console.error(e);
    state.screen = 'setup';
  }
  document.getElementById('loading').style.display = 'none';
  render();
  subscribeToPlans();
}

init();
</script>
</body>
</html>
